<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Fosenkaia — Poengtavle</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        "on-surface": "#151c22",
        "on-surface-variant": "#424656",
        "outline": "#727687",
        "outline-variant": "#c2c6d8",
        "surface-container-low": "#edf4fc",
        "surface-container": "#e8eff7",
        "surface-container-high": "#e2e9f1",
        "surface-dim": "#d4dbe3",
        "primary": "#0050cb",
        "primary-container": "#0066ff",
        "on-primary": "#ffffff",
        "secondary-container": "#fcd400",
        "on-secondary-container": "#6e5c00",
        "secondary-fixed-dim": "#e9c400",
        "error": "#ba1a1a",
        "tertiary": "#006827",
        "background": "#f6faff",
      },
      borderRadius: {
        DEFAULT: "0.75rem",
        lg: "1.25rem",
        xl: "2rem",
        full: "9999px",
      },
      fontFamily: {
        sans: ["Lexend", "sans-serif"],
      },
    },
  },
}
</script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    line-height: 1;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen">

<header class="bg-[#0050cb] text-white rounded-b-[20px] border-b-4 border-blue-800 shadow-lg flex justify-between items-center w-full px-4 py-3 sticky top-0 z-40">
  <div class="flex items-center gap-2">
    <span class="material-symbols-outlined text-white" style="font-variation-settings:'FILL' 1;">anchor</span>
    <h1 class="font-['Plus_Jakarta_Sans'] text-sm font-black italic drop-shadow-sm">Fosenkaia-quiz — Poengtavle</h1>
  </div>
  <button onclick="loadScores()" class="flex items-center gap-1.5 text-blue-200 hover:text-white font-['Plus_Jakarta_Sans'] font-bold text-xs bg-blue-700 hover:bg-blue-600 px-3 py-1.5 rounded-full transition-colors active:scale-95">
    <span class="material-symbols-outlined text-sm" id="refresh-icon">refresh</span>
    Oppdater
  </button>
</header>

<main class="px-4 py-5 max-w-2xl mx-auto">

  <div id="state-loading" class="flex flex-col items-center justify-center py-24 gap-3">
    <span class="material-symbols-outlined text-[#0050cb] text-5xl spin" style="font-variation-settings:'FILL' 1;">anchor</span>
    <p class="font-['Lexend'] text-sm text-on-surface-variant">Laster poengtavle…</p>
  </div>

  <div id="state-error" class="hidden flex-col items-center justify-center py-24 gap-3">
    <span class="material-symbols-outlined text-error text-5xl" style="font-variation-settings:'FILL' 1;">error</span>
    <p class="font-['Lexend'] text-sm text-on-surface-variant text-center">Kunne ikke laste poengtavlen.<br>Prøv å trykke Oppdater.</p>
  </div>

  <div id="state-empty" class="hidden flex-col items-center justify-center py-24 gap-3">
    <span class="material-symbols-outlined text-outline-variant text-5xl" style="font-variation-settings:'FILL' 1;">military_tech</span>
    <p class="font-['Lexend'] text-sm text-on-surface-variant">Ingen resultater ennå — bli den første!</p>
  </div>

  <div id="state-table" class="hidden">
    <div class="flex items-center justify-between mb-3">
      <span id="entry-count" class="font-['Lexend'] text-xs text-on-surface-variant"></span>
      <span id="updated-at" class="font-['Lexend'] text-xs text-outline"></span>
    </div>
    <div class="bg-white rounded-[0.75rem] border-2 border-outline-variant shadow-md overflow-hidden">
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-[#0050cb] text-white">
            <th class="text-left px-4 py-3 font-['Plus_Jakarta_Sans'] font-bold text-sm">Navn</th>
            <th class="text-center px-3 py-3 font-['Plus_Jakarta_Sans'] font-bold text-sm">Poeng</th>
            <th class="text-right px-4 py-3 font-['Plus_Jakarta_Sans'] font-bold text-sm">Tidspunkt</th>
          </tr>
        </thead>
        <tbody id="scores-body"></tbody>
      </table>
    </div>
  </div>

</main>

<script>
const SCORES_URL = 'https://raw.githubusercontent.com/Jonasglien/kystlaget-poengtavle/main/scores.json';

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(iso) {
  const d = new Date(iso);
  const dd  = String(d.getDate()).padStart(2, '0');
  const mo  = String(d.getMonth() + 1).padStart(2, '0');
  const hh  = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${dd}.${mo} ${hh}:${min}`;
}

function setState(id) {
  ['state-loading','state-error','state-empty','state-table'].forEach(s => {
    const el = document.getElementById(s);
    el.classList.toggle('hidden', s !== id);
    el.classList.toggle('flex', s === id);
  });
}

async function loadScores() {
  setState('state-loading');
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spin');
  try {
    const res = await fetch(`${SCORES_URL}?t=${Date.now()}`);
    if (!res.ok) throw new Error();
    const scores = await res.json();

    if (scores.length === 0) { setState('state-empty'); return; }

    document.getElementById('scores-body').innerHTML = scores.map((entry, i) =>
      `<tr class="${i % 2 === 1 ? 'bg-surface-container-low' : ''} border-b border-outline-variant last:border-b-0">
        <td class="px-4 py-3 font-['Plus_Jakarta_Sans'] font-bold text-sm">${escapeHtml(entry.name)}</td>
        <td class="px-3 py-3 text-center">
          <span class="inline-block bg-secondary-container text-on-secondary-container font-['Plus_Jakarta_Sans'] font-bold text-xs px-2.5 py-1 rounded-full border border-secondary-fixed-dim shadow-[0_2px_0_0_#c4a900]">${entry.score}/24</span>
        </td>
        <td class="px-4 py-3 text-right font-['Lexend'] text-xs text-on-surface-variant">${formatTime(entry.dt)}</td>
      </tr>`
    ).join('');

    const now = new Date();
    const n = scores.length;
    document.getElementById('entry-count').textContent = `${n} resultat${n !== 1 ? 'er' : ''}`;
    document.getElementById('updated-at').textContent =
      `Oppdatert ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setState('state-table');
  } catch {
    setState('state-error');
  } finally {
    icon.classList.remove('spin');
  }
}

loadScores();
</script>
</body>
</html>
